name = "oksskolten"
main = "src/index.ts"
compatibility_date = "2026-03-10"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "oksskolten"
database_id = "53d7ac03-5ae9-4800-a263-d0d98f983f11"

[[queues.producers]]
binding = "FEED_QUEUE"
queue = "oksskolten-feeds"

[[queues.consumers]]
queue = "oksskolten-feeds"
max_batch_size = 5
max_batch_timeout = 30

# P1: INDEX_QUEUE (kuromoji + FTS5 + Vectorize)
# [[queues.producers]]
# binding = "INDEX_QUEUE"
# queue = "oksskolten-index"

# Future: R2 bucket (image archival)
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "oksskolten"

[vars]
ENVIRONMENT = "production"
