name = "oksskolten"
main = "src/index.ts"
compatibility_date = "2026-03-10"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "oksskolten"
database_id = "53d7ac03-5ae9-4800-a263-d0d98f983f11"

# Workflow: article processing pipeline (replaces Queue)
[[workflows]]
name = "article-pipeline"
binding = "ARTICLE_PIPELINE"
class_name = "ArticlePipelineWorkflow"

# Container: kuromoji tokenizer
[[containers]]
class_name = "KuromojiContainer"
image = "./container/kuromoji/Dockerfile"
max_instances = 1
instance_type = "basic"

[[durable_objects.bindings]]
name = "KUROMOJI_CONTAINER"
class_name = "KuromojiContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KuromojiContainer"]

[[vectorize]]
binding = "VECTORIZE"
index_name = "oksskolten-articles"

[ai]
binding = "AI"

# OAuth: KV for token/client storage (used by @cloudflare/workers-oauth-provider)
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "904d9fafb8374e308b9c7cc9f55f3a93"

# Future: R2 bucket (image archival)
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "oksskolten"

[vars]
ENVIRONMENT = "production"
