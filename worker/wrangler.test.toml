# Test-only wrangler config: excludes AI and Vectorize bindings
# (they require remote access and cause TLS errors in workerd sandbox)
name = "oksskolten"
main = "server/index.ts"
compatibility_date = "2026-03-10"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "oksskolten"
database_id = "53d7ac03-5ae9-4800-a263-d0d98f983f11"

[[workflows]]
name = "ingest-workflow"
binding = "INGEST_WORKFLOW"
class_name = "IngestWorkflow"

[[workflows]]
name = "enrich-workflow"
binding = "ENRICH_WORKFLOW"
class_name = "EnrichWorkflow"

[[containers]]
class_name = "KuromojiContainer"
image = "./container/kuromoji/Dockerfile"
max_instances = 1
instance_type = "basic"

[[durable_objects.bindings]]
name = "KUROMOJI_CONTAINER"
class_name = "KuromojiContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KuromojiContainer"]

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "oksskolten"

# OAuth KV (in-memory for tests via Miniflare)
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "test-oauth-kv"

[vars]
ENVIRONMENT = "test"
GITHUB_CLIENT_ID = "test"
GITHUB_CLIENT_SECRET = "test"
GITHUB_ALLOWED_USERNAME = "test-user"
JWT_SECRET = "test-jwt-secret-for-unit-tests-only"
